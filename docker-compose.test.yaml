services:
  # PostgreSQL Test Database (Port 5433 - dev is 5432)
  test-db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=${TEST_POSTGRES_USER:-test_user}
      - POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD:-test_password}
      - POSTGRES_DB=${TEST_POSTGRES_DB:-test_main_server}
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql
      - ./scripts/postgres/:/scripts/
      - ./data/:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER:-test_user} -d ${TEST_POSTGRES_DB:-test_main_server}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - test-network

  # MinIO Test Instance (Port 9010 - dev is 9000)
  test-s3:
    image: quay.io/minio/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${TEST_MINIO_ROOT_USER:-test_minio_user}
      - MINIO_ROOT_PASSWORD=${TEST_MINIO_ROOT_PASSWORD:-test_minio_password}
    volumes:
      - test_minio_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - test-network

  # RabbitMQ Test Instance (Port 5673 - dev is 5672)
  test-rabbitmq:
    image: rabbitmq:4.0-management
    hostname: test-queue
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - test_rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${TEST_RABBITMQ_DEFAULT_USER:-test_user}
      - RABBITMQ_DEFAULT_PASS=${TEST_RABBITMQ_DEFAULT_PASS:-test_password}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - test-network

  # MongoDB Test Instance (Port 27019 - dev is 27017, mongo-express uses 27018)
  test-mongo:
    image: mongo:8-noble
    restart: unless-stopped
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${TEST_MONGO_INITDB_ROOT_USERNAME:-test_root}
      - MONGO_INITDB_ROOT_PASSWORD=${TEST_MONGO_INITDB_ROOT_PASSWORD:-test_password}
      - MONGO_CONFIG_USERNAME=${TEST_MONGO_CONFIG_USERNAME:-test_config_user}
      - MONGO_CONFIG_PASSWORD=${TEST_MONGO_CONFIG_PASSWORD:-test_config_password}
      - MONGO_TASK_USERNAME=${TEST_MONGO_TASK_USERNAME:-test_task_user}
      - MONGO_TASK_PASSWORD=${TEST_MONGO_TASK_PASSWORD:-test_task_password}
      - MONGO_CONFIG_DB=${TEST_MONGO_CONFIG_DB:-test_config_server}
      - MONGO_TASK_DB=${TEST_MONGO_TASK_DB:-test_task_server}
    volumes:
      - test_mongo_data:/data/db
      - ./scripts/mongo:/scripts/
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/admin",
          "--eval",
          "db.runCommand({ ping: 1 })",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - test-network

  # Redis Test Instance (Port 6380 - dev is 6379)
  test-cache:
    image: redis:latest
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - test_cache:/data
    networks:
      - test-network

volumes:
  test_cache:
  test_postgres_data:
  test_rabbitmq_data:
  test_mongo_data:
  test_minio_data:

networks:
  test-network:
    driver: bridge
    name: super-app-test-network
