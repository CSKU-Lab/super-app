services:
  main-server:
    build:
      context: ./main-server/
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./main-server/:/app
    ports:
      - "8080:8080"
    environment:
      - OTEL_SERVICE_NAME=main-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - API_URL=${MAIN_SERVER_API_URL}
      - PORT=${MAIN_SERVER_PORT}
      - DATABASE_URL=${MAIN_SERVER_DATABASE_URL}
      - COOKIE_DOMAIN=${MAIN_SERVER_COOKIE_DOMAIN}
      - FRONTEND_URL=${MAIN_SERVER_FRONTEND_URL}
      - DEV_MODE=${MAIN_SERVER_DEV_MODE}
      - GOOGLE_CLIENT_ID=${MAIN_SERVER_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${MAIN_SERVER_GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${MAIN_SERVER_JWT_SECRET}
      - JWT_REFRESH_SECRET=${MAIN_SERVER_JWT_REFRESH_SECRET}
      - S3_ACCESS_KEY_ID=${MAIN_SERVER_S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${MAIN_SERVER_S3_SECRET_ACCESS_KEY}
      - S3_USE_SSL=${MAIN_SERVER_S3_USE_SSL}
      - S3_BUCKET=${MAIN_SERVER_S3_BUCKET}
      - S3_ENDPOINT=${MAIN_SERVER_S3_ENDPOINT}
      - S3_FRONTEND_URL=${MAIN_SERVER_S3_FRONTEND_URL}
      - CONFIG_SERVER_URL=${MAIN_SERVER_CONFIG_SERVER_URL}
      - GRADER_SERVER_URL=${MAIN_SERVER_GRADER_SERVER_URL}
      - TASK_SERVER_URL=${MAIN_SERVER_TASK_SERVER_URL}
      - RBMQ_SERVER_URL=${MAIN_SERVER_RBMQ_SERVER_URL}
      - REDIS_SERVER_URL=${MAIN_SERVER_REDIS_SERVER_URL:-redis://cache:6379}
      - REDIS_ADDR=${MAIN_SERVER_REDIS_ADDR:-cache:6379}
      - REDIS_PASSWORD=${MAIN_SERVER_REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
  config-server:
    build:
      context: ./config-server/
      dockerfile: Dockerfile.dev
    volumes:
      - ./config-server/:/app
    environment:
      - OTEL_SERVICE_NAME=config-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - MONGO_URI=mongodb://mongo:27017/config_server
      - MONGO_USERNAME=${MONGO_CONFIG_USERNAME:-config_server}
      - MONGO_PASSWORD=${MONGO_CONFIG_PASSWORD:-config_password}
      - PORT=${CONFIG_SERVER_PORT:-8081}
      - DATABASE_NAME=${MONGO_CONFIG_DB}
      - ENV=docker
      - TASK_SERVER_URL=${CONFIG_SERVER_TASK_SERVER_URL}
      - GO_GRADER_SERVER_URL=${CONFIG_SERVER_GO_GRADER_SERVER_URL}
      - REDIS_SERVER_URL=${CONFIG_SERVER_REDIS_SERVER_URL}
      - REDIS_PASSWORD=${CONFIG_SERVER_REDIS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
  task-server:
    build:
      context: ./task-server/
      dockerfile: Dockerfile.dev
    volumes:
      - ./task-server/:/app
    environment:
      - OTEL_SERVICE_NAME=task-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - MONGO_URI=mongodb://mongo:27017/task_server
      - MONGO_USERNAME=${MONGO_TASK_USERNAME:-task_server}
      - MONGO_PASSWORD=${MONGO_TASK_PASSWORD:-task_server_password}
      - DATABASE_NAME=${MONGO_TASK_DB}
      - PORT=${TASK_SERVER_PORT:-8082}
      - ENV=docker
      - GRADER_SERVER_URL=${MAIN_SERVER_GRADER_SERVER_URL}
      - REDIS_SERVER_URL=${TASK_SERVER_REDIS_SERVER_URL}
      - REDIS_PASSWORD=${TASK_SERVER_REDIS_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      mongo:
        condition: service_healthy
  go-grader-master:
    build:
      context: ./go-grader/
      dockerfile: docker/master/Dockerfile.dev
    volumes:
      - ./go-grader/:/app
    environment:
      - OTEL_SERVICE_NAME=go-grader-master
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - RBMQ_SERVER_URL=${GO_GRADER_RBMQ_SERVER_URL}
      - PORT=${GO_GRADER_PORT}
      - ENV=docker
    ports:
      - "8083:8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
  go-grader-worker:
    build:
      context: ./go-grader/
      dockerfile: docker/worker/Dockerfile.dev
    privileged: true
    volumes:
      - ./go-grader/:/app
    environment:
      - OTEL_SERVICE_NAME=go-grader-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - ENV=docker
      - CONFIG_SERVER_URL=${GO_GRADER_CONFIG_SERVER_URL}
      - TASK_SERVER_URL=${GO_GRADER_TASK_SERVER_URL}
      - RBMQ_SERVER_URL=${GO_GRADER_RBMQ_SERVER_URL}
      - RUN_QUEUE_AMOUNT=1
      - GRADE_QUEUE_AMOUNT=10
    depends_on:
      rabbitmq:
        condition: service_healthy

  og-service:
    build:
      context: ./og-service/
      dockerfile: Dockerfile
    volumes:
      - ./og-service/:/app
      - /app/node_modules
    environment:
      - RBMQ_SERVER_URL=amqp://admin:password@queue:5672
      - S3_ENDPOINT=s3:9000
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-cs_minio_user}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-cs_minio_password}
      - S3_BUCKET=${MAIN_SERVER_S3_BUCKET:-cs-lab}
      - S3_USE_SSL=false
    depends_on:
      rabbitmq:
        condition: service_healthy
      s3:
        condition: service_healthy
    restart: unless-stopped

  lsp-service:
    build:
      context: ./lsp-service/
      dockerfile: Dockerfile.dev
    volumes:
      - ./lsp-service/:/app
      - /app/node_modules
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - JWT_SECRET=${MAIN_SERVER_JWT_SECRET}
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  #--- infrastructures---

  db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cs_pg_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cs_pg_password}
      - POSTGRES_DB=${POSTGRES_DB:-main-server}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql # Persist data
      - ./scripts/postgres/:/scripts/
      - ./data/:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  s3:
    image: quay.io/minio/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cs_minio_user}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-cs_minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  rabbitmq:
    image: rabbitmq:4.0-management
    hostname: queue
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  mongo:
    image: mongo:8-noble
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-password}
      - MONGO_CONFIG_USERNAME=${MONGO_CONFIG_USERNAME:-config_server}
      - MONGO_CONFIG_PASSWORD=${MONGO_CONFIG_PASSWORD:-config_password}
      - MONGO_TASK_USERNAME=${MONGO_TASK_USERNAME:-task_server}
      - MONGO_TASK_PASSWORD=${MONGO_TASK_PASSWORD:-task_password}
      - MONGO_CONFIG_DB=${MONGO_CONFIG_DB:-config_server}
      - MONGO_TASK_DB=${MONGO_TASK_DB:-task_server}
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo:/scripts/
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/admin",
          "--eval",
          "db.runCommand({ ping: 1 })",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  mongo-express:
    image: mongo-express
    ports:
      - "27018:8081"
    environment:
      - ME_CONFIG_MONGODB_URL
  cache:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - cache:/data

volumes:
  cache:
  postgres_data:
  rabbitmq_data:
  mongo_data:
  minio_data:
